<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From pasta</title>
    <link rel="stylesheet" href="stylo.css">
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Montserrat">
</head>
<body>
    <div class="grande">
    <div class="iz">
        <img src="img/Iz.png" alt="">
    </div>
    <div class="der">
        <div class="gen">
            <div class="tit">
                <h2>Realiza tu pedido</h2>
                <h5>TODAS LAS PASTAS A 185MXN</h1>
            </div>
            <div class="imn">
                <div class="i">
                    <img src="img/1.png" alt="">
                </div>
                <div class="c">
                    <img src="img/2.png" alt="">
                </div>
                <div class="d">
                    <img src="img/3.png" alt="">
                </div>
            </div>
            <div class="form">
                <form id="miFormulario">
        <center>
        <label for="pasta">PASTA</label><br>
        <select id="pasta" name="pasta" required>
             <option>Amatriciana</option>
             <option>Pesto</option>
             <option>Camarones</option>
        </select>
            <br><br>

        <label>NOMBRE</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label>DIRECCIÓN</label><br>
        <input type="text" id="direccion" name="direccion" required><br><br>

        <label>TELÉFONO</label><br>
        <input type="text" id="telefono" name="telefono" required><br><br>
        </center>
        <button type="submit">Enviar</button>
    </form>
    
    <p class="mensaje" id="mensaje"></p>
        </div>
    </div>
    </div>
    <script>

    const url = "https://script.google.com/macros/s/AKfycbzYX0OtxC0XBwvQvGbJDbaau8iV42DXX51W_n8iBetIB0K2YUeqXk_V_mnnFCI32v2H/exec"

    document.getElementById("miFormulario")
    .addEventListener("submit", function(e){

        e.preventDefault();

        const datos = {
            pasta: document.getElementById("pasta").value,
            nombre: document.getElementById("nombre").value,
            direccion: document.getElementById("direccion").value,
            telefono: document.getElementById("telefono").value,
        };

        fetch(url, {
            method:"POST",
            body:JSON.stringify(datos)
        }) 
        .then(res => res.json())
        .then(data => {
            document.getElementById("mensaje").innerHTML =
            "Datos guardados correctamente";
            document.getElementById("miFormulario").reset();
        })
        .catch(error => {
            document.getElementById("mensaje").innnerHTML =
            "Error al guardar";
        });
    });
    </script>
</body>
</html>
